name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # Handles elan + Lean toolchain + `lake build` + `.lake` caching.
      # End-to-end fixture runs live in the LeanLoad umbrella checkout,
      # which owns third_party/loader/musl.
      - uses: leanprover/lean-action@v1
